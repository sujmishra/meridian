<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="420" height="120">
  <defs>
    <clipPath id="globe">
      <circle cx="60" cy="60" r="50"/>
    </clipPath>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="fill" cx="42%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#0f2846"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
  </defs>

  <!-- ── Mark ─────────────────────────────────────────────────────── -->
  <circle cx="60" cy="60" r="59" fill="#060c18"/>
  <circle cx="60" cy="60" r="50" fill="url(#fill)"/>

  <!-- Globe wireframe -->
  <line x1="10" y1="60" x2="110" y2="60"
        stroke="#1e3a5f" stroke-width="1" clip-path="url(#globe)"/>
  <path d="M 15,39 Q 60,42 105,39"
        fill="none" stroke="#1e3a5f" stroke-width="1" clip-path="url(#globe)"/>
  <path d="M 15,81 Q 60,78 105,81"
        fill="none" stroke="#1e3a5f" stroke-width="1" clip-path="url(#globe)"/>
  <path d="M 60,10 C 25,30 25,90 60,110"
        fill="none" stroke="#1e3a5f" stroke-width="1" clip-path="url(#globe)"/>
  <path d="M 60,10 C 95,30 95,90 60,110"
        fill="none" stroke="#1e3a5f" stroke-width="1" clip-path="url(#globe)"/>

  <!-- Prime meridian glow pass -->
  <g filter="url(#glow)">
    <line x1="60" y1="10" x2="60" y2="110"
          stroke="#38bdf8" stroke-width="4" opacity="0.55" clip-path="url(#globe)"/>
    <circle cx="60" cy="10"  r="6" fill="#38bdf8" opacity="0.5"/>
    <circle cx="60" cy="39"  r="6" fill="#38bdf8" opacity="0.5"/>
    <circle cx="60" cy="60"  r="8" fill="#38bdf8" opacity="0.5"/>
    <circle cx="60" cy="81"  r="6" fill="#38bdf8" opacity="0.5"/>
    <circle cx="60" cy="110" r="6" fill="#38bdf8" opacity="0.5"/>
  </g>

  <!-- Prime meridian sharp pass -->
  <line x1="60" y1="10" x2="60" y2="110"
        stroke="#38bdf8" stroke-width="1.5" clip-path="url(#globe)"/>

  <!-- Off-meridian nodes -->
  <circle cx="34" cy="60" r="2.5" fill="#2563eb"/>
  <circle cx="86" cy="60" r="2.5" fill="#2563eb"/>
  <circle cx="41" cy="39" r="2"   fill="#2563eb"/>
  <circle cx="79" cy="39" r="2"   fill="#2563eb"/>
  <circle cx="41" cy="81" r="2"   fill="#2563eb"/>
  <circle cx="79" cy="81" r="2"   fill="#2563eb"/>

  <!-- Prime-meridian nodes -->
  <circle cx="60" cy="10"  r="3"   fill="#38bdf8"/>
  <circle cx="60" cy="39"  r="3"   fill="#38bdf8"/>
  <circle cx="60" cy="60"  r="4.5" fill="#38bdf8"/>
  <circle cx="60" cy="81"  r="3"   fill="#38bdf8"/>
  <circle cx="60" cy="110" r="3"   fill="#38bdf8"/>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#1e3a5f" stroke-width="1.5"/>
  <path d="M 22,28 A 50,50 0 0 1 98,28"
        fill="none" stroke="white" stroke-width="0.5" opacity="0.08" clip-path="url(#globe)"/>

  <!-- ── Wordmark ───────────────────────────────────────────────── -->
  <!-- "meridian" — weight 700, geometric sans, tracked tight -->
  <text x="136" y="55"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="34" font-weight="700" letter-spacing="-0.3"
        fill="#e6edf3">meridian</text>

  <!-- Tagline — uppercase, wide tracking, accent colour -->
  <text x="138" y="79"
        font-family="'Inter', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif"
        font-size="10.5" font-weight="400" letter-spacing="2"
        fill="#38bdf8">UNIFIED AGENT REGISTRY</text>
</svg>
