<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meridian — Unified Agent Registry</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .uri-cell { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .nav-active { background: rgba(255,255,255,0.12); color: #fff; }
    .nav-item { color: #94a3b8; transition: background 0.15s, color 0.15s; }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #e2e8f0; }
    .nav-active:hover { background: rgba(255,255,255,0.12); color: #fff; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen flex flex-col overflow-hidden">

<!-- ── HEADER ─────────────────────────────────────────────────────────────── -->
<header class="bg-white border-b border-slate-200 px-6 h-14 flex items-center justify-between shrink-0 z-10">
  <div class="flex items-center gap-3">
    <svg class="w-7 h-7" viewBox="0 0 32 32" fill="none">
      <rect width="32" height="32" rx="7" fill="#2563eb"/>
      <polygon points="16,6 26,14 26,22 16,26 6,22 6,14" fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="16" cy="16" r="2.5" fill="white"/>
      <line x1="16" y1="6"  x2="16" y2="13.5" stroke="white" stroke-width="1.2"/>
      <line x1="26" y1="14" x2="18.2" y2="17.1" stroke="white" stroke-width="1.2"/>
      <line x1="26" y1="22" x2="18.2" y2="18.9" stroke="white" stroke-width="1.2"/>
      <line x1="16" y1="26" x2="16" y2="18.5" stroke="white" stroke-width="1.2"/>
      <line x1="6"  y1="22" x2="13.8" y2="18.9" stroke="white" stroke-width="1.2"/>
      <line x1="6"  y1="14" x2="13.8" y2="17.1" stroke="white" stroke-width="1.2"/>
    </svg>
    <span class="font-semibold text-lg tracking-tight">Meridian</span>
    <span class="text-slate-400 text-sm hidden sm:block">/ Unified Agent Registry</span>
  </div>
  <div class="flex items-center gap-3">
    <span id="trust-root-chip"
      class="hidden text-xs bg-blue-50 text-blue-700 border border-blue-200 px-3 py-0.5 rounded-full font-mono font-medium">
    </span>
    <button onclick="refreshAll()" title="Refresh data"
      class="p-1.5 rounded-lg text-slate-400 hover:text-blue-600 hover:bg-blue-50 transition-colors">
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
    </button>
  </div>
</header>

<!-- ── BODY ───────────────────────────────────────────────────────────────── -->
<div class="flex flex-1 overflow-hidden">

  <!-- Sidebar -->
  <nav class="w-52 bg-slate-900 flex flex-col p-3 gap-0.5 shrink-0">
    <button onclick="showView('agents')" id="nav-agents"
      class="nav-item text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2.5 font-medium">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="2" y="7" width="20" height="14" rx="2"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
      </svg>
      Agents
    </button>
    <button onclick="showView('discover')" id="nav-discover"
      class="nav-item text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2.5 font-medium">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      Discover
    </button>
    <button onclick="showView('trust')" id="nav-trust"
      class="nav-item text-left px-3 py-2 rounded-lg text-sm flex items-center gap-2.5 font-medium">
      <svg class="w-4 h-4 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      Trust Root
    </button>
    <div class="flex-1"></div>
    <div class="px-3 py-2 text-xs text-slate-600 font-mono">v1 API</div>
  </nav>

  <!-- Main -->
  <main class="flex-1 overflow-auto p-6">

    <!-- ══ AGENTS ══════════════════════════════════════════════════════════ -->
    <div id="view-agents">

      <!-- Stats -->
      <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Total</p>
          <p id="stat-total" class="text-3xl font-bold text-slate-800 mt-1">—</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Healthy</p>
          <p id="stat-healthy" class="text-3xl font-bold text-emerald-600 mt-1">—</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Degraded</p>
          <p id="stat-degraded" class="text-3xl font-bold text-amber-500 mt-1">—</p>
        </div>
        <div class="bg-white rounded-xl border border-slate-200 p-4">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-wider">Unknown</p>
          <p id="stat-unknown" class="text-3xl font-bold text-slate-400 mt-1">—</p>
        </div>
      </div>

      <!-- Agents table -->
      <div class="bg-white rounded-xl border border-slate-200">
        <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
          <h2 class="font-semibold text-slate-800">Registered Agents</h2>
          <button onclick="openRegisterModal()"
            class="inline-flex items-center gap-1.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M12 5v14M5 12h14"/>
            </svg>
            Register Agent
          </button>
        </div>
        <div id="agents-container" class="overflow-x-auto min-h-[120px]"></div>
      </div>
    </div>

    <!-- ══ DISCOVER ════════════════════════════════════════════════════════ -->
    <div id="view-discover" class="hidden">
      <div class="flex flex-col gap-5">

        <div class="bg-white rounded-xl border border-slate-200 p-5">
          <h2 class="font-semibold text-slate-800 mb-4">Discover Agents</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-slate-500">Capability prefix</label>
              <input id="disc-capability" type="text" placeholder="/workflow"
                class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-slate-500">Protocol</label>
              <select id="disc-protocol"
                class="border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Any</option>
                <option value="a2a">A2A</option>
                <option value="mcp">MCP</option>
                <option value="rest">REST</option>
                <option value="acp">ACP</option>
              </select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-slate-500">Health</label>
              <select id="disc-health"
                class="border border-slate-300 rounded-lg px-3 py-2 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Any</option>
                <option value="healthy">Healthy</option>
                <option value="degraded">Degraded</option>
                <option value="unknown">Unknown</option>
              </select>
            </div>
            <div class="flex flex-col gap-1">
              <label class="text-xs font-medium text-slate-500">Limit</label>
              <input id="disc-limit" type="number" value="20" min="1" max="200"
                class="border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            </div>
          </div>
          <button onclick="runDiscover()"
            class="mt-4 inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
            </svg>
            Search
          </button>
        </div>

        <div id="discover-results" class="hidden bg-white rounded-xl border border-slate-200">
          <div class="flex items-center justify-between px-5 py-3 border-b border-slate-100">
            <h3 class="font-medium text-slate-700 text-sm">Results</h3>
            <span id="discover-count" class="text-xs text-slate-400"></span>
          </div>
          <div id="discover-table" class="overflow-x-auto"></div>
        </div>

      </div>
    </div>

    <!-- ══ TRUST ROOT ══════════════════════════════════════════════════════ -->
    <div id="view-trust" class="hidden">
      <div class="bg-white rounded-xl border border-slate-200 p-6 max-w-2xl">
        <div class="flex items-center gap-2 mb-5">
          <svg class="w-5 h-5 text-blue-600" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <h2 class="font-semibold text-slate-800">Trust Root</h2>
        </div>
        <div id="trust-root-content" class="text-sm text-slate-400">Loading…</div>
      </div>
    </div>

  </main>
</div>

<!-- ── REGISTER MODAL ─────────────────────────────────────────────────────── -->
<div id="register-modal"
  class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto">

    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 class="font-semibold text-slate-800">Register Agent</h3>
      <button onclick="closeRegisterModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
        <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 6 6 18M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <form id="register-form" onsubmit="handleRegister(event)" class="p-6 flex flex-col gap-4">

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-slate-700">
          Agent URI <span class="text-red-500">*</span>
        </label>
        <input id="reg-uri" type="text" required
          placeholder="agent://acme.com/workflow/approval/agent_…"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono
                 focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        <p class="text-xs text-slate-400">
          Format: <code>agent://&lt;trust-root&gt;/&lt;capability/path&gt;/&lt;agent-id&gt;</code>
        </p>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-sm font-medium text-slate-700">
          Protocols <span class="text-red-500">*</span>
        </label>
        <div class="flex gap-5 flex-wrap">
          <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
            <input type="checkbox" value="a2a"  class="reg-proto accent-blue-600" onchange="updateEndpointFields()"> A2A
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
            <input type="checkbox" value="mcp"  class="reg-proto accent-blue-600" onchange="updateEndpointFields()"> MCP
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
            <input type="checkbox" value="rest" class="reg-proto accent-blue-600" onchange="updateEndpointFields()"> REST
          </label>
          <label class="flex items-center gap-2 text-sm cursor-pointer select-none">
            <input type="checkbox" value="acp"  class="reg-proto accent-blue-600" onchange="updateEndpointFields()"> ACP
          </label>
        </div>
      </div>

      <div id="endpoint-fields" class="flex flex-col gap-3"></div>

      <div class="flex flex-col gap-1">
        <label class="text-sm font-medium text-slate-700">
          Attestation
          <span class="text-slate-400 font-normal">(optional)</span>
        </label>
        <textarea id="reg-attestation" rows="2"
          placeholder="PASETO v4 token…"
          class="border border-slate-300 rounded-lg px-3 py-2 text-sm font-mono
                 focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-2 border-t border-slate-100">
        <button type="button" onclick="closeRegisterModal()"
          class="px-4 py-2 text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
          Cancel
        </button>
        <button type="submit" id="reg-submit"
          class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-60
                 text-white text-sm font-medium px-5 py-2 rounded-lg transition-colors">
          Register
        </button>
      </div>
    </form>
  </div>
</div>

<!-- ── TOASTS ─────────────────────────────────────────────────────────────── -->
<div id="toasts" class="fixed bottom-5 right-5 flex flex-col gap-2 z-[100] pointer-events-none"></div>

<script>
// ── API ───────────────────────────────────────────────────────────────────────
const api = {
  async discover(params = {}) {
    const r = await fetch('/v1/discover?' + new URLSearchParams(params));
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  },
  async register(body) {
    const r = await fetch('/v1/agents', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  },
  async update(uri, patch) {
    const r = await fetch('/v1/agents?uri=' + encodeURIComponent(uri), {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(patch),
    });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || `HTTP ${r.status}`);
    return data;
  },
  async deregister(uri) {
    const r = await fetch('/v1/agents?uri=' + encodeURIComponent(uri), { method: 'DELETE' });
    if (!r.ok) {
      const data = await r.json().catch(() => ({}));
      throw new Error(data.error || `HTTP ${r.status}`);
    }
  },
  async trustRoot() {
    const r = await fetch('/.well-known/agent-trust');
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return r.json();
  },
};

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentView = 'agents';

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showView(name) {
  currentView = name;
  ['agents', 'discover', 'trust'].forEach(v => {
    document.getElementById('view-' + v).classList.toggle('hidden', v !== name);
    document.getElementById('nav-' + v).classList.toggle('nav-active', v === name);
  });
  if (name === 'trust') loadTrustRoot();
}

// ── AGENTS ────────────────────────────────────────────────────────────────────
async function loadAgents() {
  const container = document.getElementById('agents-container');
  try {
    const data = await api.discover({ limit: 200 });
    const agents = data.agents || [];
    renderStats(agents);
    renderTable(agents, container, true);
  } catch (e) {
    container.innerHTML = errorMsg('Failed to load agents: ' + e.message);
  }
}

function renderStats(agents) {
  const healthy  = agents.filter(a => a.health === 'healthy').length;
  const degraded = agents.filter(a => a.health === 'degraded').length;
  const unknown  = agents.filter(a => !a.health || a.health === 'unknown').length;
  document.getElementById('stat-total').textContent    = agents.length;
  document.getElementById('stat-healthy').textContent  = healthy;
  document.getElementById('stat-degraded').textContent = degraded;
  document.getElementById('stat-unknown').textContent  = unknown;
}

function renderTable(agents, container, withActions) {
  if (!agents || agents.length === 0) {
    container.innerHTML = emptyState('No agents found');
    return;
  }
  const rows = agents.map(a => {
    const uri = a.agent_uri || '';
    const actions = withActions ? `
      <td class="px-4 py-3">
        <div class="flex items-center gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
          <select onchange="handleHealthChange(this,'${esc(uri)}')"
            class="text-xs border border-slate-200 rounded-md px-2 py-1 bg-white
                   focus:outline-none focus:ring-1 focus:ring-blue-400 cursor-pointer">
            <option value="" disabled selected>Set health…</option>
            <option value="healthy">Healthy</option>
            <option value="degraded">Degraded</option>
            <option value="unknown">Unknown</option>
          </select>
          <button onclick="confirmDeregister('${esc(uri)}')"
            class="text-xs text-red-500 hover:text-red-700 px-2 py-1 rounded
                   hover:bg-red-50 font-medium transition-colors">
            Remove
          </button>
        </div>
      </td>` : '<td></td>';
    return `
      <tr class="border-t border-slate-100 hover:bg-slate-50/70 transition-colors group">
        <td class="px-5 py-3">
          <span class="uri-cell block font-mono text-xs text-slate-700" title="${esc(uri)}">${esc(uri)}</span>
          <span class="text-xs text-slate-400">${esc(a.trust_root || '')}</span>
        </td>
        <td class="px-5 py-3 font-mono text-xs text-slate-600">${esc(a.capability_path || '')}</td>
        <td class="px-5 py-3">${renderProtocols(a.protocols)}</td>
        <td class="px-5 py-3">${renderHealth(a.health)}</td>
        <td class="px-5 py-3 text-xs text-slate-400 whitespace-nowrap">${fmtDate(a.registered_at)}</td>
        ${actions}
      </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="w-full text-left">
      <thead>
        <tr class="text-xs font-semibold text-slate-400 uppercase tracking-wider bg-slate-50/50">
          <th class="px-5 py-3 font-medium">Agent URI</th>
          <th class="px-5 py-3 font-medium">Capability</th>
          <th class="px-5 py-3 font-medium">Protocols</th>
          <th class="px-5 py-3 font-medium">Health</th>
          <th class="px-5 py-3 font-medium">Registered</th>
          <th class="px-5 py-3 font-medium w-48"></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── HEALTH UPDATE ─────────────────────────────────────────────────────────────
async function handleHealthChange(select, uri) {
  const health = select.value;
  if (!health) return;
  select.disabled = true;
  try {
    await api.update(uri, { health });
    toast('Health set to "' + health + '"');
    await loadAgents();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    select.disabled = false;
    select.value = '';
  }
}

// ── DEREGISTER ────────────────────────────────────────────────────────────────
async function confirmDeregister(uri) {
  if (!confirm('Deregister this agent?\n\n' + uri)) return;
  try {
    await api.deregister(uri);
    toast('Agent deregistered');
    await loadAgents();
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── DISCOVER ──────────────────────────────────────────────────────────────────
async function runDiscover() {
  const params = {};
  const cap    = document.getElementById('disc-capability').value.trim();
  const proto  = document.getElementById('disc-protocol').value;
  const health = document.getElementById('disc-health').value;
  const limit  = document.getElementById('disc-limit').value;
  if (cap)   params.capability = cap;
  if (proto) params.protocol   = proto;
  if (health) params.health    = health;
  if (limit)  params.limit     = limit;

  const resultsEl = document.getElementById('discover-results');
  resultsEl.classList.add('hidden');

  try {
    const data   = await api.discover(params);
    const agents = data.agents || [];
    document.getElementById('discover-count').textContent =
      agents.length + ' result' + (agents.length !== 1 ? 's' : '');
    renderTable(agents, document.getElementById('discover-table'), false);
    resultsEl.classList.remove('hidden');
  } catch (e) {
    toast(e.message, 'error');
  }
}

// ── TRUST ROOT ────────────────────────────────────────────────────────────────
async function loadTrustRoot() {
  const el = document.getElementById('trust-root-content');
  try {
    const d = await api.trustRoot();

    const chip = document.getElementById('trust-root-chip');
    chip.textContent = d.trust_root;
    chip.classList.remove('hidden');

    const algoClass = d.algorithm === 'paseto-v4-public'
      ? 'bg-blue-100 text-blue-800 border border-blue-200'
      : 'bg-slate-100 text-slate-600 border border-slate-200';

    const keyBlock = d.public_key
      ? `<div class="mt-5 pt-5 border-t border-slate-100">
           <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Public Key (JWK)</p>
           <pre class="bg-slate-50 border border-slate-200 rounded-lg p-4 text-xs font-mono
                       text-slate-700 overflow-x-auto leading-relaxed">${esc(JSON.stringify(d.public_key, null, 2))}</pre>
         </div>`
      : `<p class="mt-3 text-xs text-slate-400 bg-amber-50 border border-amber-100 rounded-lg px-3 py-2">
           No public key material — HMAC-SHA256 mode, shared key is out-of-band.
         </p>`;

    el.innerHTML = `
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Trust Root</p>
          <p class="font-mono font-semibold text-slate-900 text-base">${esc(d.trust_root)}</p>
        </div>
        <div>
          <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Algorithm</p>
          <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${algoClass}">
            ${esc(d.algorithm)}
          </span>
        </div>
      </div>
      ${keyBlock}
      <div class="mt-5 pt-5 border-t border-slate-100">
        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Well-known Endpoint</p>
        <div class="flex items-center gap-2">
          <span class="inline-block bg-slate-100 text-slate-500 text-xs font-mono px-2 py-0.5 rounded">GET</span>
          <code class="text-xs font-mono text-slate-700">/.well-known/agent-trust</code>
        </div>
      </div>`;
  } catch (e) {
    el.innerHTML = `<p class="text-sm text-red-500">Failed to load: ${esc(e.message)}</p>`;
  }
}

// ── REGISTER MODAL ────────────────────────────────────────────────────────────
function openRegisterModal() {
  document.getElementById('register-form').reset();
  document.getElementById('endpoint-fields').innerHTML = '';
  document.getElementById('register-modal').classList.remove('hidden');
  setTimeout(() => document.getElementById('reg-uri').focus(), 50);
}

function closeRegisterModal() {
  document.getElementById('register-modal').classList.add('hidden');
}

function updateEndpointFields() {
  const checked = [...document.querySelectorAll('.reg-proto:checked')].map(c => c.value);
  const container = document.getElementById('endpoint-fields');
  const existing = {};
  container.querySelectorAll('input[data-proto]').forEach(i => { existing[i.dataset.proto] = i.value; });
  container.innerHTML = checked.map(p => `
    <div class="flex flex-col gap-1">
      <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">${p.toUpperCase()} endpoint</label>
      <input data-proto="${p}" type="text" required placeholder="https://…"
        value="${esc(existing[p] || '')}"
        class="border border-slate-300 rounded-lg px-3 py-2 text-sm
               focus:outline-none focus:ring-2 focus:ring-blue-500"/>
    </div>`).join('');
}

async function handleRegister(e) {
  e.preventDefault();
  const uri       = document.getElementById('reg-uri').value.trim();
  const protocols = [...document.querySelectorAll('.reg-proto:checked')].map(c => c.value);
  if (protocols.length === 0) { toast('Select at least one protocol', 'error'); return; }

  const endpoints = {};
  let allFilled = true;
  document.querySelectorAll('#endpoint-fields input[data-proto]').forEach(i => {
    if (!i.value.trim()) allFilled = false;
    endpoints[i.dataset.proto] = i.value.trim();
  });
  if (!allFilled) { toast('All endpoint URLs are required', 'error'); return; }

  const attestation = document.getElementById('reg-attestation').value.trim();
  const btn = document.getElementById('reg-submit');
  btn.disabled = true;
  btn.textContent = 'Registering…';

  try {
    await api.register({
      agent_uri:  uri,
      protocols,
      endpoints,
      ...(attestation && { attestation }),
    });
    toast('Agent registered');
    closeRegisterModal();
    await loadAgents();
  } catch (e) {
    toast(e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Register';
  }
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function refreshAll() {
  loadAgents();
  if (currentView === 'trust') loadTrustRoot();
}

const PROTO_BADGE = {
  a2a:  'bg-blue-100 text-blue-700',
  mcp:  'bg-violet-100 text-violet-700',
  rest: 'bg-teal-100 text-teal-700',
  acp:  'bg-orange-100 text-orange-700',
};

function renderProtocols(protocols) {
  if (!protocols || protocols.length === 0) return '<span class="text-slate-300 text-xs">—</span>';
  return protocols.map(p =>
    `<span class="inline-flex items-center px-1.5 py-0.5 rounded text-xs font-semibold
                  ${PROTO_BADGE[p] || 'bg-slate-100 text-slate-600'}">${esc(p)}</span>`
  ).join(' ');
}

const HEALTH_STYLE = {
  healthy:  { ring: 'bg-emerald-500', text: 'text-emerald-700', label: 'Healthy'  },
  degraded: { ring: 'bg-amber-400',   text: 'text-amber-700',   label: 'Degraded' },
  unknown:  { ring: 'bg-slate-300',   text: 'text-slate-500',   label: 'Unknown'  },
};

function renderHealth(health) {
  const s = HEALTH_STYLE[health] || HEALTH_STYLE.unknown;
  return `<span class="inline-flex items-center gap-1.5 ${s.text}">
    <span class="w-1.5 h-1.5 rounded-full ${s.ring} shrink-0 animate-pulse"></span>
    <span class="text-xs font-medium">${s.label}</span>
  </span>`;
}

function fmtDate(iso) {
  if (!iso || iso.startsWith('0001')) return '—';
  try {
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return '—'; }
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function emptyState(msg) {
  return `<div class="py-16 flex flex-col items-center gap-3 text-slate-300">
    <svg class="w-10 h-10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="2" y="7" width="20" height="14" rx="2"/>
      <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
    </svg>
    <p class="text-sm">${esc(msg)}</p>
  </div>`;
}

function errorMsg(msg) {
  return `<p class="text-sm text-red-500 px-5 py-10 text-center">${esc(msg)}</p>`;
}

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `pointer-events-auto px-4 py-2.5 rounded-lg shadow-lg text-sm font-medium max-w-xs
    transition-opacity duration-300
    ${type === 'error' ? 'bg-red-600 text-white' : 'bg-slate-800 text-white'}`;
  el.textContent = msg;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 350); }, 3000);
}

// Close modal on backdrop click
document.getElementById('register-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeRegisterModal();
});

// Close modal on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeRegisterModal();
});

// ── INIT ──────────────────────────────────────────────────────────────────────
showView('agents');
loadAgents();
loadTrustRoot(); // prime the trust root chip in the header
</script>
